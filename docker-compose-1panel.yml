services:
  app:
    image: ghcr.io/dyedd/lens:latest
    container_name: lens
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${LENS_PORT:-3000}:${LENS_PORT:-3000}"
    volumes:
      - /opt/1panel/apps/lens/data:/app/data
    networks:
      - 1panel-network

networks:
  1panel-network:
    external: true
